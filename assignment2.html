<!DOCTYPE html>
<html>
<head>
    <title>Book Management System</title>
</head>
<body>
<h2>Book Management System</h2>
<form id="bookForm">
<label>Title</label>
<input type="text" id="title" name="title"><br><br>
<label>Author</label>
<input type="text" id="author" name="author"><br><br>
<label>ISBN</label>
<input type="text" id="isbn" name="isbn"><br><br>
<label>Publication Date</label>
<input type="date" id="publicationDate" name="publicationDate"><br><br>
<label>Genre</label>
<input type="text" id="genre" name="genre"><br><br>
<input type="submit" value="Add Book">
</form>
<h2>Registered Books</h2>
<ol id="bookList"></ol>
<script>
let books=[];
let editIndex=-1;
const calculateAge=(date)=>{
    return new Date().getFullYear()-new Date(date).getFullYear();
};
const getCategory=(genre)=>{
    genre=genre.toLowerCase();
    if(genre.includes("fiction")) return "Fiction";
    if(genre.includes("science")) return "Science";
    if(genre.includes("history")) return "History";
    if(genre.includes("technology")) return "Technology";
    return "General";
};
const displayBooks=()=>{
    const list=document.getElementById("bookList");
    list.innerHTML="";
    books.forEach((book,index)=>{
        list.innerHTML+=`
        <li>
        <b>Title:</b> ${book.title}<br>
        <b>Author:</b> ${book.author}<br>
        <b>ISBN:</b> ${book.isbn}<br>
        <b>Publication Date:</b> ${book.publicationDate}<br>
        <b>Age:</b> ${calculateAge(book.publicationDate)} Years<br>
        <b>Genre:</b> ${book.genre}<br>
        <b>Category:</b> ${getCategory(book.genre)}<br><br>
        <button onclick="editBook(${index})">Edit</button>
        <button onclick="deleteBook(${index})">Delete</button>
        <hr>
        </li>
        `;
    });

};
document.getElementById("bookForm").addEventListener("submit",function(e){
    e.preventDefault();
    const title=document.getElementById("title").value.trim();
    const author=document.getElementById("author").value.trim();
    const isbn=document.getElementById("isbn").value.trim();
    const publicationDate=document.getElementById("publicationDate").value;
    const genre=document.getElementById("genre").value.trim();
    if(title==""||author==""||isbn==""||publicationDate==""||genre==""){
        alert("Please fill all fields.");
        return;
    }
    if(isNaN(isbn)){
        alert("ISBN must be numeric.");
        return;
    }
    const book={
        title,
        author,
        isbn,
        publicationDate,
        genre
    };
    if(editIndex==-1){
        books.push(book);
    }
    else{
        books[editIndex]=book;
        editIndex=-1;
    }
    displayBooks();
    document.getElementById("bookForm").reset();
});
function editBook(index){
    editIndex=index;
    document.getElementById("title").value=books[index].title;
    document.getElementById("author").value=books[index].author;
    document.getElementById("isbn").value=books[index].isbn;
    document.getElementById("publicationDate").value=books[index].publicationDate;
    document.getElementById("genre").value=books[index].genre;
}
function deleteBook(index){
    books.splice(index,1);
    displayBooks();
}
</script>
</body>
</html>
